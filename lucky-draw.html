<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mini-game & Lucky Draw</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="data.js"></script>

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    color:white;
    overflow:hidden;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;
}

.container{
    display:flex;
    height:100vh;
    padding:20px;
    box-sizing:border-box;
}

.side{
    width:25%;
    padding:10px;
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}
.center{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#participantList{
    flex:1;                  
    overflow-y:auto;        
    padding-right:8px;
    margin-top:10px;
	display:none;
	
}
#participantList::-webkit-scrollbar{
    width:8px;
}

#participantList::-webkit-scrollbar-track{
    background:rgba(255,255,255,0.1);
    border-radius:10px;
}

#participantList::-webkit-scrollbar-thumb{
    background:linear-gradient(#ff4081,#ff0080);
    border-radius:10px;
}
#winnerList{
    overflow-y:auto;        
    padding:8px;
	height: 65vh
}
#winnerList::-webkit-scrollbar{
    width:8px;
}

#winnerList::-webkit-scrollbar-track{
    background:rgba(255,255,255,0.1);
    border-radius:10px;
}

#winnerList::-webkit-scrollbar-thumb{
    background:linear-gradient(#ff4081,#ff0080);
    border-radius:10px;
}
#winnerList div{
    padding:4px;
	margin-top:5px;
    background:linear-gradient(145deg,#fff,#ffe6f0);
    border-radius:8px;
	color:#e91e63;
    box-shadow:0 0 30px #ff0080;
	letter-spacing: 2px;
}

select,button{
    padding:12px 25px;
    font-size:25px;
    border-radius:30px;
    border:none;
	outline: none;
}
select{
	color:#e91e63;
	background: linear-gradient(145deg,#fff,#ffe6f0);
    color: #e91e63;
    box-shadow: 0 0 30px #ff0080;
}

.run {
    position: fixed;
    bottom: 20vh; 
    left: 50%;
    transform: translateX(-50%);
}
.run1{
	 position: fixed;
    bottom: 10vh;  
    left: 50%;
    transform: translateX(-50%);  
}
h2 {
    font-family: "Times New Roman", serif;
    font-size: 30px;
    font-weight: 600;
    text-align: center;
	background: linear-gradient(145deg,#fff,#ffe6f0);
    color: blue;
    box-shadow: 0 0 30px #ff0080;
    text-shadow:
        0 2px 6px rgba(0,0,0,0.4);
    letter-spacing: 1px;
    margin-bottom: 5px;
}
h3 {
    font-family: "Times New Roman", serif;
    font-size: 35px;
    font-weight: 700;
    text-align: center;
    background: linear-gradient(145deg,#fff,#ffe6f0);
    color: #e91e63;
    box-shadow: 0 0 30px #ff0080;
    text-shadow:
        0 3px 8px rgba(0,0,0,0.35),
        0 0 12px rgba(255,255,255,0.6);

    letter-spacing: 2px;
    margin-top: 10px;
}
button{
    background:#00c853;
    color:white;
    cursor:pointer;
}
button:hover {
  background: #1565c0;
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

#nameDisplay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 25%;
    min-height: 90px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    padding: 25px;
    border-radius: 20px;
    background: linear-gradient(145deg,#fff,#ffe6f0);
    color: #e91e63;
    box-shadow: 0 0 30px #ff0080;
    text-align: center;
}

.rolling{
    animation: glow 1s infinite;
}
@keyframes glow{
    0%{box-shadow:0 0 15px #fff;}
    50%{box-shadow:0 0 60px #ff0080;}
    100%{box-shadow:0 0 15px #fff;}
}

.participant{
    padding:6px;
    margin-bottom:6px;
    border-radius:8px;
    background:linear-gradient(145deg,#fff,#ffe6f0);
    color:#e91e63;
    box-shadow:0 0 10px #ff0080;
}

.winner-highlight{
    animation: flash 2s ease;
    background:linear-gradient(45deg,#ff0066,#ffcc00) !important;
}
@keyframes flash{
    0%{box-shadow:0 0 10px #fff;}
    50%{box-shadow:0 0 50px #ff0080;}
    100%{box-shadow:0 0 10px #fff;}
}

#winnerPopup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(6px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9000;
    animation:fadeIn 0.5s ease;
}

.popup-box{
    position:relative;
    width:600px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    background:linear-gradient(145deg,#ffffff,#ffe6f0);
    box-shadow:
        0 0 40px #ff0080,
        0 0 80px rgba(255,0,128,0.6);
    animation:zoomIn 0.5s ease;
}

.popup-box h1{
    font-size:36px;
    color:#e91e63;
    margin-bottom:20px;
}

#winnerName{
    font-size:40px;
    font-weight:bold;
    color:#ff1744;
    margin:15px 0;
    text-shadow:0 0 20px rgba(255,0,80,0.7);
}

#winnerPrize{
    font-size:26px;
    color:#333;
    margin-bottom:25px;
}

.popup-box button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    background:linear-gradient(90deg,#ff0080,#ff4081);
    color:white;
    cursor:pointer;
    box-shadow:0 0 20px #ff0080;
}

.popup-box button:hover{
    transform:scale(1.1);
}

/* hiệu ứng */
@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

@keyframes zoomIn{
    from{transform:scale(0.5); opacity:0}
    to{transform:scale(1); opacity:1}
}
.popup-box{
    animation:zoomIn 0.5s ease, pulse 2s infinite 1s;
}

@keyframes pulse{
    0%{box-shadow:0 0 40px #ff0080;}
    50%{box-shadow:0 0 80px #ff0080;}
    100%{box-shadow:0 0 40px #ff0080;}
}

canvas{
    position:fixed !important;
    top:0;
    left:0;
    z-index:9999 !important;   /* cao hơn popup */
    pointer-events:none;
}
#exportBtn {
    position: fixed;
    bottom: 20px;
    right: 40px;
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #ff9800, #ff5722);
    color: white;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    display: none;
    z-index: 9999;
	font-size:small;
}

#exportBtn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 25px rgba(0,0,0,0.4);
}
</style>
</head>

<body>
<div class="container">
<button id="exportBtn" onclick="exportWinners()">
    📥 Xuất Excel
</button>
<div class="side" >
</div>

<div class="center">
	<div id="nameDisplay">Ai sẽ là người may mắn?</div>
	<div class="run"><select id="prizeSelect"></select></div>
	<div class="run1"><button  id="drawBtn" onclick="startDraw()">🎯 QUAY NGAY</button>
	</div>
</div>

<div class="side">
<h2>🌸 THAM GIA QUAY THƯỞNG <span id="participantCount"></span> NGƯỜI</h2>
<div id="participantList"></div>
<h3>🏆 DANH SÁCH TRÚNG THƯỞNG (<span id="winnerCount"></span>)</h3>
<div id="winnerList"></div>
</div>
</div>
<div id="winnerPopup">
    <div class="popup-box">
        <div class="popup-glow"></div>
        <h1>🎉 CHÚC MỪNG 🎉</h1>
        <div id="winnerName"></div>
        <div id="winnerPrize"></div>
		<div style="display:flex; gap:20px; justify-content:center;">
			<button onclick="confirmWinner()">✅ TRÚNG</button>
			<button style="background:#555" onclick="rejectWinner()">❌ LOẠI</button>
		</div>
        <!-- <button onclick="closePopup()">ĐÓNG</button> -->
    </div>
</div>

<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/Dung2410/vongquaymayman/main/spin.mp3">
</audio>

<audio id="winSound">
<source src="https://raw.githubusercontent.com/Dung2410/vongquaymayman/main/success.mp3">
</audio>

<script>

let prizeConfig = {
    "Giải Khuyến Khích": { count: 16, money: "500.000đ" },
    "Giải Ba": { count: 5, money: "1.000.000đ" },
    "Giải Nhì": { count: 3, money: "2.000.000đ" },
    "Giải Nhất": { count: 2, money: "3.000.000đ" },
    "Giải Đặc Biệt": { count: 1, money: "5.000.000đ" }
};
let winners=[];
let interval;
let currentName="";
let isDrawing=false;

const prizeSelect=document.getElementById("prizeSelect");
const participantList=document.getElementById("participantList");

function updateCounts(){
    document.getElementById("participantCount").innerText = participants.length;
    document.getElementById("winnerCount").innerText = winners.length;
	if (winners.length > 0) {
        document.getElementById("exportBtn").style.display = "block";
    }
}
function loadPrizes(selected = null){

    const currentSelected = selected || prizeSelect.value;

    prizeSelect.innerHTML = "";

    let availablePrizes = Object.keys(prizeConfig)
        .filter(p => prizeConfig[p].count > 0);

    if(availablePrizes.length === 0){
        prizeSelect.innerHTML = "<option>Đã hết giải</option>";
        prizeSelect.disabled = true;
        document.getElementById("drawBtn").disabled = true;
        return;
    }

    prizeSelect.disabled = false;
    document.getElementById("drawBtn").disabled = false;

    availablePrizes.forEach(prize => {
        let opt = document.createElement("option");
        opt.value = prize;
        opt.text =
            prize +
            " (" +
            prizeConfig[prize].count +
            " giải - " +
            prizeConfig[prize].money +
            ")";
        prizeSelect.appendChild(opt);
    });

    // Nếu giải cũ vẫn còn thì giữ
    if(currentSelected && prizeConfig[currentSelected] && prizeConfig[currentSelected].count > 0){
        prizeSelect.value = currentSelected;
    }else{
        prizeSelect.value = availablePrizes[0];
    }
}
loadPrizes();

function renderParticipants(){
    participantList.innerHTML="";
    participants.forEach((p,i)=>{
        let div=document.createElement("div");
        div.className="participant";
        div.textContent=(i+1)+". "+p;
        participantList.appendChild(div);
    });
}
renderParticipants();

function renderWinners(){
    const list=document.getElementById("winnerList");
    list.innerHTML="";
    winners.forEach((w,i)=>{
        let div=document.createElement("div");
        div.textContent=(i+1)+". "+w;
        list.appendChild(div);
    });
}

function startDraw(){
    if(isDrawing || participants.length===0) return;

    isDrawing=true;
    document.getElementById("drawBtn").disabled=true;

    document.getElementById("nameDisplay").classList.add("rolling");

    let prize=prizeSelect.value;
    bgMusic.play();

    interval=setInterval(()=>{
        let rand=Math.floor(Math.random()*participants.length);
        currentName=participants[rand];
        document.getElementById("nameDisplay").innerHTML=currentName;
    },80);

    setTimeout(()=>{
        clearInterval(interval);
        showWinner(prize);
    },4000);
}

function showWinner(prize){

    document.getElementById("nameDisplay").classList.remove("rolling");

    bgMusic.pause();
    bgMusic.currentTime = 0;

    winSound.currentTime = 0;
    winSound.play().catch(()=>{});

    confetti({particleCount:300,spread:150});

    document.getElementById("winnerName").innerHTML = currentName;

    document.getElementById("winnerPrize").innerHTML =
        "🏆 " + prize +
        "<br>💰 " + prizeConfig[prize].money;

    document.getElementById("winnerPopup").style.display = "flex";

    // Lưu giải đang quay để xử lý sau
    window.currentPrize = prize;
}
function confirmWinner(){

    let prize = window.currentPrize;

    // Trừ giải
    prizeConfig[prize].count--;

    // Loại khỏi danh sách tham gia
    participants = participants.filter(p => p !== currentName);

    // Thêm vào danh sách trúng
    winners.push(currentName + " - " + prize);

    renderParticipants();
    renderWinners();
    loadPrizes(prize);
    updateCounts();

    closePopup();
}
function rejectWinner(){

    // Chỉ loại khỏi danh sách tham gia
    participants = participants.filter(p => p !== currentName);

    renderParticipants();
    updateCounts();

    document.getElementById("winnerPopup").style.display = "none";

    // Quay tiếp cùng giải (không trừ giải)
    isDrawing = false;
    startDraw();
}

function closePopup(){
    document.getElementById("winnerPopup").style.display="none";
    document.getElementById("drawBtn").disabled=false;
    document.getElementById("nameDisplay").innerHTML="Tiếp tục tìm người may mắn tiếp theo?";
    isDrawing=false;
}

// Fullscreen lần đầu click
document.body.onclick=function(){
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }
    document.body.onclick=null;
}

renderParticipants();
renderWinners();
updateCounts();

function exportWinners() {

    let data = winners.map((w, index) => {

        // Bỏ số thứ tự đầu chuỗi
        let noNumber = w.replace(/^\d+\.\s*/, "");

        let parts = noNumber.split(" - ");

        return {
            STT: index + 1,
            "Họ và tên": parts[0] || "",
            "Phòng ban": parts[1] || "",
            "Giải thưởng": parts[2] || ""
        };
    });

    const worksheet = XLSX.utils.json_to_sheet(data);

    // ✅ Fix độ rộng cột
    worksheet["!cols"] = [
        { wch: 6 },   // STT
        { wch: 30 },  // Họ và tên
        { wch: 25 },  // Phòng ban
        { wch: 25 }   // Giải thưởng
    ];

    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "TrungGiai");

    XLSX.writeFile(workbook, "Danh_sach_trung_giai_8_3.xlsx");
}
</script>
</body>
</html>
